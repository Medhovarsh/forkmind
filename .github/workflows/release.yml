name: Release

# Publish to npm on a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# or via the "Run workflow" button. Requires an NPM_TOKEN secret with publish
# rights (Settings → Secrets and variables → Actions).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run dashboard:build # ensures dashboard/dist ships in the tarball

      # Publish with provenance. `prepack` rebuilds the dashboard as a safety net.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
